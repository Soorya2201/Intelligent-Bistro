<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bistro AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --cream:#F5F0E8;
  --cream2:#EDE8DF;
  --brown:#3D2B1F;
  --brown2:#5A4030;
  --gold:#C9933A;
  --gold2:#E8B44A;
  --muted:#9E9089;
  --card:#FFFFFF;
  --border:rgba(61,43,31,0.1);
  --wave-user:#C9933A;
  --wave-ai:#5A7A3A;
  --danger:#E24B4A;
}

html,body{height:100%;overflow:hidden;}

body{
  background:var(--cream);
  font-family:'DM Sans',sans-serif;
  color:var(--brown);
  display:flex;
  flex-direction:column;
}

/* ── HEADER ── */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 24px;
  border-bottom:0.5px solid var(--border);
  background:var(--cream);
  z-index:10;
  flex-shrink:0;
}
.logo{
  font-family:'DM Serif Display',serif;
  font-size:22px;
  color:var(--brown);
}
.logo span{color:var(--gold);}

.header-right{display:flex;align-items:center;gap:12px;}
.cart-pill{
  display:flex;align-items:center;gap:6px;
  background:var(--brown);
  color:#fff;
  border:none;
  border-radius:999px;
  padding:7px 14px;
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  transition:background 0.2s;
}
.cart-pill:hover{background:var(--brown2);}
.cart-pill .badge{
  background:var(--gold);
  color:#fff;
  border-radius:50%;
  width:18px;height:18px;
  font-size:11px;
  display:flex;align-items:center;justify-content:center;
  font-weight:500;
}

/* ── MAIN LAYOUT ── */
.main{
  flex:1;
  display:flex;
  overflow:hidden;
  position:relative;
}

/* ── CART PANEL ── */
.cart-panel{
  width:320px;
  flex-shrink:0;
  border-right:0.5px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background:var(--cream);
}

.cart-header{
  padding:20px 20px 12px;
  border-bottom:0.5px solid var(--border);
  flex-shrink:0;
}
.cart-title{
  font-family:'DM Serif Display',serif;
  font-size:18px;
  color:var(--brown);
  margin-bottom:2px;
}
.cart-subtitle{font-size:12px;color:var(--muted);letter-spacing:0.04em;}

.cart-items{
  flex:1;
  overflow-y:auto;
  padding:12px 16px;
}
.cart-items::-webkit-scrollbar{width:3px;}
.cart-items::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.cart-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:11px 12px;
  background:var(--card);
  border-radius:14px;
  border:0.5px solid var(--border);
  margin-bottom:8px;
  animation:slideIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;
  overflow:hidden;
}
.cart-item::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:3px;
  background:var(--gold);
  border-radius:2px 0 0 2px;
}
@keyframes slideIn{
  from{opacity:0;transform:translateX(-20px) scale(0.96);}
  to{opacity:1;transform:none;}
}
.item-emoji{font-size:24px;flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:13px;font-weight:500;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-price{font-size:12px;color:var(--gold);font-weight:500;margin-top:1px;}

.qty-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.qty-btn{
  width:24px;height:24px;
  border-radius:50%;
  border:0.5px solid var(--border);
  background:var(--cream);
  color:var(--brown);
  font-size:14px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;
  font-family:'DM Sans',sans-serif;
}
.qty-btn:hover{background:var(--cream2);}
.qty-num{font-size:13px;font-weight:500;min-width:16px;text-align:center;}

.cart-footer{
  padding:14px 16px;
  border-top:0.5px solid var(--border);
  flex-shrink:0;
}
.total-row{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:12px;
}
.total-label{font-size:12px;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;}
.total-amount{font-family:'DM Serif Display',serif;font-size:22px;color:var(--brown);}

.checkout-btn{
  width:100%;
  padding:13px;
  background:var(--brown);
  color:#fff;
  border:none;
  border-radius:12px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  transition:background 0.2s,transform 0.15s;
  letter-spacing:0.02em;
}
.checkout-btn:hover{background:var(--brown2);transform:translateY(-1px);}
.checkout-btn:active{transform:none;}

.cart-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;
  gap:10px;
  color:var(--muted);
  padding:24px;
  text-align:center;
}
.cart-empty-icon{font-size:40px;opacity:0.4;}
.cart-empty-text{font-size:13px;line-height:1.5;}

/* ── RECOMMENDED pills ── */
.reco-section{
  padding:10px 16px 14px;
  border-bottom:0.5px solid var(--border);
  flex-shrink:0;
}
.reco-label{font-size:10px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px;}
.reco-pills{display:flex;gap:6px;flex-wrap:wrap;}
.reco-pill{
  font-size:12px;
  padding:5px 10px;
  border-radius:999px;
  border:0.5px solid var(--border);
  background:var(--cream2);
  color:var(--brown2);
  cursor:pointer;
  transition:background 0.15s,border-color 0.15s;
  white-space:nowrap;
}
.reco-pill:hover{background:var(--gold);color:#fff;border-color:var(--gold);}

/* ── CHAT AREA ── */
.chat-area{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* chat messages */
.chat-messages{
  flex:1;
  overflow-y:auto;
  padding:24px 28px;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.chat-messages::-webkit-scrollbar{width:3px;}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.msg{
  display:flex;
  gap:10px;
  animation:msgIn 0.28s ease;
}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.msg.user{flex-direction:row-reverse;}

.msg-avatar{
  width:30px;height:30px;flex-shrink:0;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:500;
}
.msg.user .msg-avatar{background:var(--brown);color:#fff;}
.msg.ai   .msg-avatar{background:var(--gold);color:#fff;font-family:'DM Serif Display',serif;}

.msg-bubble{
  max-width:72%;
  padding:10px 14px;
  border-radius:16px;
  font-size:14px;
  line-height:1.55;
  position:relative;
}
.msg.user .msg-bubble{
  background:var(--brown);color:#fff;
  border-bottom-right-radius:4px;
}
.msg.ai .msg-bubble{
  background:var(--card);color:var(--brown);
  border:0.5px solid var(--border);
  border-bottom-left-radius:4px;
}

.msg-time{
  font-size:10px;
  color:var(--muted);
  margin-top:3px;
  align-self:flex-end;
}

/* quick reply chips */
.quick-replies{
  display:flex;gap:8px;flex-wrap:wrap;
  padding:0 28px 12px;
}
.qr-chip{
  font-size:13px;
  padding:7px 14px;
  border-radius:999px;
  border:1px solid var(--gold);
  background:transparent;
  color:var(--gold);
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all 0.18s;
  animation:chipIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes chipIn{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:none;}}
.qr-chip:hover{background:var(--gold);color:#fff;}

/* ── INPUT + VOICE ZONE ── */
.input-zone{
  border-top:0.5px solid var(--border);
  padding:14px 20px;
  background:var(--cream);
  flex-shrink:0;
  position:relative;
}

/* Wave bar — hidden by default, slides up from bottom */
.wave-bar{
  height:0;
  overflow:hidden;
  transition:height 0.42s cubic-bezier(0.4,0,0.2,1);
  position:relative;
}
.wave-bar.open{height:90px;}

#waveCanvas{
  display:block;
  width:100%;
  height:80px;
}

/* Text input row */
.input-row{
  display:flex;
  align-items:center;
  gap:10px;
  position:relative;
}

.text-input{
  flex:1;
  padding:11px 16px;
  border-radius:24px;
  border:0.5px solid var(--border);
  background:var(--card);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  color:var(--brown);
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.text-input::placeholder{color:var(--muted);}
.text-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,147,58,0.1);}
.text-input.editing{border-color:var(--gold);background:#fffdf8;}

/* Mic / send buttons */
.mic-btn{
  width:44px;height:44px;flex-shrink:0;
  border-radius:50%;
  border:none;
  background:var(--gold);
  color:#fff;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 2px 8px rgba(201,147,58,0.35);
}
.mic-btn:hover{background:var(--gold2);transform:scale(1.05);}
.mic-btn.recording{
  background:var(--danger);
  box-shadow:0 0 0 0 rgba(226,75,74,0.5);
  animation:rec-pulse 1s ease-in-out infinite;
}
@keyframes rec-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,0.5);}
  50%{box-shadow:0 0 0 12px rgba(226,75,74,0);}
}

.send-btn{
  width:44px;height:44px;flex-shrink:0;
  border-radius:50%;
  border:none;
  background:var(--brown);
  color:#fff;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.send-btn:hover{background:var(--brown2);transform:scale(1.05);}

/* Stop btn — slides from mic position to far right */
.stop-btn{
  width:44px;height:44px;
  border-radius:50%;
  border:0.5px solid var(--border);
  background:var(--cream2);
  color:var(--brown);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  position:absolute;
  right:0;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s ease, right 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.stop-btn.visible{
  opacity:1;
  pointer-events:all;
  right:0;
}

/* recording mode: mic hidden, stop visible */
.input-row.recording .mic-btn{
  opacity:0;
  pointer-events:none;
  transform:scale(0.7);
  transition:opacity 0.2s, transform 0.2s;
}
.input-row.recording .stop-btn{
  opacity:1;
  pointer-events:all;
}

/* typing indicator */
.typing-indicator{
  display:flex;align-items:center;gap:4px;
  padding:8px 14px;
}
.typing-dot{
  width:6px;height:6px;
  border-radius:50%;
  background:var(--muted);
  animation:typingBounce 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:0.15s;}
.typing-dot:nth-child(3){animation-delay:0.3s;}
@keyframes typingBounce{
  0%,60%,100%{transform:translateY(0);}
  30%{transform:translateY(-5px);}
}

/* status badge */
.voice-status{
  position:absolute;
  top:-28px;left:50%;transform:translateX(-50%);
  font-size:10px;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--muted);
  display:flex;align-items:center;gap:5px;
  opacity:0;
  transition:opacity 0.3s;
  white-space:nowrap;
}
.voice-status.visible{opacity:1;}
.voice-status-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--danger);
  animation:rec-pulse 1s ease-in-out infinite;
}

/* transcript within input */
.transcript-inline{
  position:absolute;
  left:16px;top:50%;transform:translateY(-50%);
  font-size:14px;
  color:var(--brown);
  pointer-events:none;
  opacity:0;
  transition:opacity 0.2s;
  white-space:nowrap;
  overflow:hidden;
  max-width:calc(100% - 120px);
}
.transcript-inline.visible{opacity:1;}
.transcript-cursor{
  display:inline-block;width:2px;height:14px;
  background:var(--gold);margin-left:1px;
  vertical-align:middle;
  animation:blink 0.7s steps(1) infinite;
}
@keyframes blink{50%{opacity:0;}}

svg{display:block;}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Bistro<span>.</span>AI</div>
  <div class="header-right">
    <button class="cart-pill" onclick="toggleCartPanel()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
      Order
      <div class="badge" id="cartBadge">0</div>
    </button>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- CART PANEL -->
  <div class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <div class="cart-title">Your Order</div>
      <div class="cart-subtitle">Items update as you chat</div>
    </div>

    <div class="reco-section">
      <div class="reco-label">Often paired</div>
      <div class="reco-pills" id="recoPills">
        <div class="reco-pill" onclick="quickAdd('Truffle Fries','🍟',8.50)">+ Truffle Fries</div>
        <div class="reco-pill" onclick="quickAdd('Lemonade','🍋',4.50)">+ Lemonade</div>
        <div class="reco-pill" onclick="quickAdd('Onion Rings','🧅',7.00)">+ Onion Rings</div>
      </div>
    </div>

    <div class="cart-items" id="cartItems">
      <div class="cart-empty" id="cartEmpty">
        <div class="cart-empty-icon">🛒</div>
        <div class="cart-empty-text">Your cart is empty.<br/>Chat or tap a suggestion above.</div>
      </div>
    </div>

    <div class="cart-footer">
      <div class="total-row">
        <span class="total-label">Total</span>
        <span class="total-amount" id="totalAmount">$0.00</span>
      </div>
      <button class="checkout-btn" onclick="checkout()">Place Order →</button>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area">

    <div class="chat-messages" id="chatMessages">
      <!-- AI welcome -->
      <div class="msg ai">
        <div class="msg-avatar">B</div>
        <div>
          <div class="msg-bubble">Hey! 👋 I'm Bistro AI. Tell me what you'd like — or just speak your order.</div>
          <div class="msg-time">just now</div>
        </div>
      </div>
    </div>

    <!-- Quick reply chips -->
    <div class="quick-replies" id="quickReplies">
      <button class="qr-chip" onclick="sendChip(this)">Spicy Chicken Sandwich</button>
      <button class="qr-chip" onclick="sendChip(this)">Classic Burger</button>
      <button class="qr-chip" onclick="sendChip(this)">What's vegan?</button>
    </div>

    <!-- INPUT ZONE -->
    <div class="input-zone">

      <!-- Voice status label -->
      <div class="voice-status" id="voiceStatus">
        <div class="voice-status-dot"></div>
        <span id="voiceStatusText">listening</span>
      </div>

      <!-- Wave bar (hidden until recording) -->
      <div class="wave-bar" id="waveBar">
        <canvas id="waveCanvas"></canvas>
      </div>

      <div class="input-row" id="inputRow">
        <!-- Text input -->
        <div style="flex:1;position:relative;">
          <input
            class="text-input"
            id="textInput"
            placeholder="Type your order…"
            autocomplete="off"
          />
          <!-- live transcript overlay while recording -->
          <div class="transcript-inline" id="transcriptInline">
            <span id="transcriptSpan"></span><span class="transcript-cursor"></span>
          </div>
        </div>

        <!-- Mic button -->
        <button class="mic-btn" id="micBtn" onclick="toggleRecord()" aria-label="Record">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 1a4 4 0 014 4v6a4 4 0 01-8 0V5a4 4 0 014-4z"/>
            <path d="M19 10a7 7 0 01-14 0M12 19v4M8 23h8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/>
          </svg>
        </button>

        <!-- Stop button (slides in when recording) -->
        <button class="stop-btn" id="stopBtn" onclick="stopRecord()" aria-label="Stop">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="4" y="4" width="16" height="16" rx="3"/>
          </svg>
        </button>

        <!-- Send button -->
        <button class="send-btn" onclick="sendText()" aria-label="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let cart = [];
let isRecording = false;
let recordTimer = null;
let typingTimer  = null;
let waveRaf      = null;
let wavePhase    = 0;
let waveAmp      = 0;
let waveTarget   = 0;

const DPR = window.devicePixelRatio || 1;

const MENU = [
  {id:'spicy-chicken', name:'Spicy Chicken Sandwich', emoji:'🌶️', price:13.00},
  {id:'classic-burger',name:'Classic Bistro Burger',  emoji:'🍔', price:14.50},
  {id:'vegan-burger',  name:'Beyond Bistro Burger',   emoji:'🌱', price:16.00},
  {id:'mushroom-burger',name:'Mushroom Swiss Burger', emoji:'🍄', price:15.00},
  {id:'truffle-fries', name:'Truffle Fries',          emoji:'🍟', price:8.50},
  {id:'sweet-potato',  name:'Sweet Potato Fries',     emoji:'🍠', price:7.50},
  {id:'onion-rings',   name:'Onion Rings',            emoji:'🧅', price:7.00},
  {id:'lemonade',      name:'Lemonade',               emoji:'🍋', price:4.50},
  {id:'iced-tea',      name:'Iced Tea',               emoji:'🍵', price:3.50},
  {id:'large-water',   name:'Large Water',            emoji:'💧', price:2.00},
];

const AI_REPLIES = {
  'spicy chicken sandwich': {text:"One Spicy Chicken Sandwich coming right up! 🌶️ Most people grab sweet potato fries with it — want some?", add:{id:'spicy-chicken',name:'Spicy Chicken Sandwich',emoji:'🌶️',price:13.00}},
  'classic burger':{text:"Classic Bistro Burger added! 🍔 Goes great with truffle fries — want me to throw those in?", add:{id:'classic-burger',name:'Classic Bistro Burger',emoji:'🍔',price:14.50}},
  'vegan':{text:"Sure! Our vegan options are: Beyond Bistro Burger 🌱 ($16), Sweet Potato Fries ($7.50), Garden Salad ($6), and all our drinks. What can I add for you?", add:null},
  'mushroom burger':{text:"Mushroom Swiss Burger added! 🍄 Want an iced tea to go with it?", add:{id:'mushroom-burger',name:'Mushroom Swiss Burger',emoji:'🍄',price:15.00}},
  'truffle fries':{text:"Truffle fries added! 🍟 They come with our house garlic aioli.", add:{id:'truffle-fries',name:'Truffle Fries',emoji:'🍟',price:8.50}},
  'lemonade':{text:"Fresh lemonade added! 🍋 A great choice.", add:{id:'lemonade',name:'Lemonade',emoji:'🍋',price:4.50}},
  'water':{text:"Large still water added 💧", add:{id:'large-water',name:'Large Water',emoji:'💧',price:2.00}},
  'onion rings':{text:"Onion rings added! 🧅 — beer-battered with smoky ranch.", add:{id:'onion-rings',name:'Onion Rings',emoji:'🧅',price:7.00}},
};

/* ═══════════════════════════════════════════
   WAVE CANVAS
═══════════════════════════════════════════ */
const canvas = document.getElementById('waveCanvas');
const ctx    = canvas.getContext('2d');

function resizeWave(){
  const w = canvas.parentElement.getBoundingClientRect().width || 600;
  canvas.width  = w * DPR;
  canvas.height = 80 * DPR;
  canvas.style.width  = w + 'px';
  canvas.style.height = '80px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}

function drawWave(){
  const w = canvas.width / DPR;
  const h = canvas.height / DPR;
  ctx.clearRect(0,0,w,h);

  waveAmp += (waveTarget - waveAmp) * 0.09;
  wavePhase += 0.06;

  const color = isRecording ? '#C9933A' : '#5A7A3A';

  for(let layer=0; layer<3; layer++){
    const a   = waveAmp * (1 - layer*0.25);
    const f   = 1.8 + layer*0.4;
    const ph  = wavePhase + layer*0.8;
    const op  = (0.55 - layer*0.15) * (waveAmp/45);
    const hex = Math.round(Math.max(0,op)*255).toString(16).padStart(2,'0');

    ctx.beginPath();
    ctx.lineWidth = 1.6 - layer*0.4;

    const g = ctx.createLinearGradient(0,0,w,0);
    g.addColorStop(0,   color+'00');
    g.addColorStop(0.15,color+hex);
    g.addColorStop(0.5, color+hex);
    g.addColorStop(0.85,color+hex);
    g.addColorStop(1,   color+'00');
    ctx.strokeStyle = g;

    for(let x=0;x<=w;x+=1.5){
      const nx  = x/w;
      const env = 1 - Math.pow(Math.abs(nx-0.5)*2, 2.2);
      const y   = h/2
        + Math.sin(nx*Math.PI*2*f + ph)         * a * env
        + Math.sin(nx*Math.PI*2*(f*1.6) + ph*1.2) * a * 0.3 * env;
      x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  waveRaf = requestAnimationFrame(drawWave);
}

/* ═══════════════════════════════════════════
   RECORDING
═══════════════════════════════════════════ */
const USER_SAMPLES = [
  "Add two spicy chicken sandwiches",
  "Do you have vegan options?",
  "I'd like a classic burger please",
  "Can I get some truffle fries and a lemonade?",
  "Add the mushroom burger and a large water",
];
let sampleIdx = 0;

function toggleRecord(){
  if(!isRecording) startRecord();
  else stopRecord();
}

function startRecord(){
  isRecording = true;

  // show wave bar
  resizeWave();
  document.getElementById('waveBar').classList.add('open');
  waveTarget = 38;
  if(!waveRaf) drawWave();

  // swap buttons
  document.getElementById('inputRow').classList.add('recording');
  document.getElementById('micBtn').classList.add('recording');
  document.getElementById('stopBtn').classList.add('visible');

  // show voice status
  document.getElementById('voiceStatus').classList.add('visible');

  // blur/clear text input, show transcript overlay
  const input = document.getElementById('textInput');
  input.value = '';
  input.classList.add('editing');
  document.getElementById('transcriptInline').classList.add('visible');
  document.getElementById('quickReplies').innerHTML = '';

  // simulate typing transcript
  const sample = USER_SAMPLES[sampleIdx % USER_SAMPLES.length];
  let i = 0;
  recordTimer = setInterval(()=>{
    document.getElementById('transcriptSpan').textContent = sample.slice(0,i);
    i++;
    if(i > sample.length){
      clearInterval(recordTimer);
      setTimeout(()=>{ if(isRecording) stopRecord(sample); }, 400);
    }
  }, 45);
}

function stopRecord(forcedText){
  isRecording = false;
  clearInterval(recordTimer);

  // wave down
  waveTarget = 0;
  setTimeout(()=>{
    document.getElementById('waveBar').classList.remove('open');
    cancelAnimationFrame(waveRaf);
    waveRaf = null;
  }, 420);

  // restore buttons
  document.getElementById('inputRow').classList.remove('recording');
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('stopBtn').classList.remove('visible');
  document.getElementById('voiceStatus').classList.remove('visible');

  // move transcript text into input
  const finalText = forcedText || document.getElementById('transcriptSpan').textContent;
  const input = document.getElementById('textInput');
  input.value = finalText;
  input.classList.remove('editing');
  document.getElementById('transcriptInline').classList.remove('visible');
  document.getElementById('transcriptSpan').textContent = '';

  if(finalText.trim()) sendMessage(finalText.trim());
  sampleIdx++;
}

/* ═══════════════════════════════════════════
   CHAT
═══════════════════════════════════════════ */
function sendText(){
  const input = document.getElementById('textInput');
  const txt   = input.value.trim();
  if(!txt) return;
  input.value = '';
  sendMessage(txt);
}

document.getElementById('textInput').addEventListener('keydown', e=>{
  if(e.key==='Enter') sendText();
});

function sendChip(el){
  const txt = el.textContent;
  el.closest('.quick-replies').innerHTML = '';
  sendMessage(txt);
}

function sendMessage(text){
  addMsg('user', text);
  showTyping();

  setTimeout(()=>{
    removeTyping();
    const reply = getAIReply(text);
    addMsg('ai', reply.text);
    if(reply.add) addToCart(reply.add);
    showQuickReplies(reply.chips || []);
  }, 900 + Math.random()*400);
}

function getAIReply(text){
  const t = text.toLowerCase();
  for(const [key, val] of Object.entries(AI_REPLIES)){
    if(t.includes(key)) return {...val, chips:['Anything else?','See full menu','Go to checkout']};
  }
  return {
    text:"I didn't quite catch that — could you rephrase? Or try: 'Add a classic burger' or 'What's vegan?'",
    add:null,
    chips:['Classic Burger','Spicy Chicken Sandwich','What\'s vegan?']
  };
}

function addMsg(role, text){
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role==='user' ? 'U' : 'B';

  const inner = document.createElement('div');

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

  inner.appendChild(bubble);
  inner.appendChild(time);
  wrap.appendChild(avatar);
  wrap.appendChild(inner);

  document.getElementById('chatMessages').appendChild(wrap);
  scrollChat();
}

let typingEl = null;
function showTyping(){
  typingEl = document.createElement('div');
  typingEl.className = 'msg ai';
  typingEl.id = 'typingMsg';
  typingEl.innerHTML = `
    <div class="msg-avatar">B</div>
    <div class="msg-bubble" style="background:var(--card);border:0.5px solid var(--border);">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>`;
  document.getElementById('chatMessages').appendChild(typingEl);
  scrollChat();
}
function removeTyping(){
  const el = document.getElementById('typingMsg');
  if(el) el.remove();
}

function showQuickReplies(chips){
  const qr = document.getElementById('quickReplies');
  qr.innerHTML = '';
  chips.forEach(c=>{
    const btn = document.createElement('button');
    btn.className = 'qr-chip';
    btn.textContent = c;
    btn.onclick = ()=>sendChip(btn);
    qr.appendChild(btn);
  });
}

function scrollChat(){
  const msgs = document.getElementById('chatMessages');
  msgs.scrollTop = msgs.scrollHeight;
}

/* ═══════════════════════════════════════════
   CART
═══════════════════════════════════════════ */
function addToCart(item){
  const existing = cart.find(i=>i.id===item.id);
  if(existing){ existing.qty++; }
  else{ cart.push({...item, qty:1}); }
  renderCart();
}

function quickAdd(name, emoji, price){
  const id = name.toLowerCase().replace(/ /g,'-');
  addToCart({id, name, emoji, price});
  addMsg('ai', `${emoji} ${name} added to your order!`);
}

function changeQty(id, delta){
  const item = cart.find(i=>i.id===id);
  if(!item) return;
  item.qty += delta;
  if(item.qty <= 0) cart = cart.filter(i=>i.id!==id);
  renderCart();
}

function renderCart(){
  const container = document.getElementById('cartItems');
  const emptyEl   = document.getElementById('cartEmpty');
  const badge      = document.getElementById('cartBadge');
  const total      = document.getElementById('totalAmount');

  // count & total
  const count = cart.reduce((s,i)=>s+i.qty, 0);
  const sum   = cart.reduce((s,i)=>s+i.price*i.qty, 0);
  badge.textContent = count;
  total.textContent = '$'+sum.toFixed(2);

  // clear & rebuild
  container.innerHTML = '';

  if(cart.length === 0){
    container.appendChild(emptyEl);
    emptyEl.style.display = 'flex';
    return;
  }

  cart.forEach(item=>{
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.id = 'cart-'+item.id;
    div.innerHTML = `
      <div class="item-emoji">${item.emoji}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-price">$${item.price.toFixed(2)}</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
        <div class="qty-num">${item.qty}</div>
        <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
      </div>`;
    container.appendChild(div);
  });
}

function checkout(){
  if(cart.length===0){ alert('Your cart is empty!'); return; }
  const lines = cart.map(i=>`${i.qty}× ${i.name}`).join(', ');
  alert(`Order confirmed! 🎉\n\n${lines}\n\nTotal: $${cart.reduce((s,i)=>s+i.price*i.qty,0).toFixed(2)}`);
  cart = [];
  renderCart();
}

function toggleCartPanel(){
  const p = document.getElementById('cartPanel');
  p.style.display = p.style.display==='none' ? 'flex' : 'none';
}

/* init */
renderCart();
window.addEventListener('resize', ()=>{ if(isRecording) resizeWave(); });
</script>
</body>
